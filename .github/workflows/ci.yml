name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    uses: ./.github/workflows/_component-integrity.yml
    with:
      runner: ${{ vars.RUNNER || 'ubuntu-latest' }}
      checkout-version: ${{ vars.CHECKOUT_VERSION || 'v6' }}
      setup-node-version: ${{ vars.SETUP_NODE_VERSION || 'v6' }}

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    uses: ./.github/workflows/_deploy-pages.yml
    with:
      runner: ${{ vars.RUNNER || 'ubuntu-latest' }}
      checkout-version: ${{ vars.CHECKOUT_VERSION || 'v6' }}
      setup-node-version: ${{ vars.SETUP_NODE_VERSION || 'v6' }}
      upload-pages-version: ${{ vars.UPLOAD_PAGES_VERSION || 'v4' }}
      deploy-pages-version: ${{ vars.DEPLOY_PAGES_VERSION || 'v4' }}
    permissions:
      contents: read
      pages: write
      id-token: write

  publish:
    if: github.event_name == 'release'
    uses: ./.github/workflows/_publish-packages.yml
    with:
      runner: ${{ vars.RUNNER || 'ubuntu-latest' }}
      checkout-version: ${{ vars.CHECKOUT_VERSION || 'v6' }}
      setup-node-version: ${{ vars.SETUP_NODE_VERSION || 'v6' }}
    permissions:
      contents: read
      packages: write
