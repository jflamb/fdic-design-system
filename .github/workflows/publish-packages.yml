name: Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Configure npm for GitHub Packages
        run: |
          npm config set "@jflamb:registry" "https://npm.pkg.github.com"
          npm config set "//npm.pkg.github.com/:_authToken" "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release packages
        run: |
          npm run validate:tokens
          npm run validate:packages
          npm run test:components
          npm run build:tokens
          npm run build:components

      - name: Validate publish payloads
        run: |
          npm pack --dry-run --workspace @jflamb/fdic-ds-tokens
          npm pack --dry-run --workspace @jflamb/fdic-ds-components

      - name: Publish @jflamb/fdic-ds-tokens
        run: npm publish --workspace @jflamb/fdic-ds-tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @jflamb/fdic-ds-components
        run: npm publish --workspace @jflamb/fdic-ds-components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DTCG release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            packages/tokens/fdic.tokens.json#fdic.tokens.json \
            --clobber
