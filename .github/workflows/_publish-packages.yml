name: Publish Packages

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      checkout-version:
        type: string
        default: 'v6'
      setup-node-version:
        type: string
        default: 'v6'

jobs:
  publish:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@${{ inputs.checkout-version }}

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          setup-node-version: ${{ inputs.setup-node-version }}

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@${{ inputs.setup-node-version }}
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com

      - name: Build components
        run: npm run build:components

      - name: Publish @fdic-ds/components
        run: npm publish --workspace @fdic-ds/components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
