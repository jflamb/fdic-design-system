name: Component Integrity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Check out repository
        if: github.server_url == 'https://github.com'
        uses: actions/checkout@v6

      - name: Check out repository (GHES)
        if: github.server_url != 'https://github.com'
        uses: actions/checkout@v4

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Validate component automation
        run: npm run validate:components

      - name: Run component tests
        run: npm run test:components

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Storybook browser tests
        run: npm run test:storybook

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts
