name: Component Integrity

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      checkout-version:
        type: string
        default: 'v6'
      setup-node-version:
        type: string
        default: 'v6'

jobs:
  validate:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@${{ inputs.checkout-version }}

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          setup-node-version: ${{ inputs.setup-node-version }}

      - name: Validate component automation
        run: npm run validate:components

      - name: Run component tests
        run: npm run test:components

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Storybook browser tests
        run: npm run test:storybook

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts
