name: Deploy GitHub Pages

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
      checkout-version:
        type: string
        default: 'v6'
      setup-node-version:
        type: string
        default: 'v6'
      upload-pages-version:
        type: string
        default: 'v4'
      deploy-pages-version:
        type: string
        default: 'v4'

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@${{ inputs.checkout-version }}

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          setup-node-version: ${{ inputs.setup-node-version }}

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts

      - name: Copy Storybook into docs output
        run: cp -r apps/storybook/storybook-static apps/docs/.vitepress/dist/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@${{ inputs.upload-pages-version }}
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@${{ inputs.deploy-pages-version }}
