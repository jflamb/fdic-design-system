name: "Component Integrity (GHES)"

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    if: github.server_url != 'https://github.com'
    runs-on: gha-linux-test-automation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JFrog CLI
        uses: fdic-actions/setup-jfrog@v1
        with:
          jfUrl: ${{ vars.JF_PROD_URL }}
          jfToken: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Set up Node.js
        uses: fdic-actions/setup-node@v1
        with:
          node-version: 20

      - name: Configure npm resolution via JFrog
        shell: pwsh
        run: |
          jf npm-config `
            --repo-resolve=all-npm `
            --server-id-resolve=${{ github.event.repository.name }}.${{ github.sha }}

      - name: Install dependencies
        shell: pwsh
        run: jf npm ci

      - name: Validate token automation
        run: npm run validate:tokens

      - name: Validate component automation
        run: npm run validate:components

      - name: Run component tests
        run: npm run test:components

