name: "Component Integrity (GHES)"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    if: github.server_url != 'https://github.com'
    runs-on: ["linux", "on-azure", "prod"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JFrog CLI
        uses: fdic-actions/setup-jfrog@v1
        with:
          jfUrl: ${{ vars.JF_PROD_URL }}
          jfToken: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Set up Node.js
        uses: fdic-actions/setup-node@v1
        with:
          node-version: 20

      - name: Configure npm resolution via JFrog
        run: jf npmc --repo-resolve="all-npm" --server-id-resolve="${{ github.event.repository.name }}.${{ github.sha }}"
        shell: bash

      - name: Install dependencies
        run: jf npm ci

      - name: Validate component automation
        run: npm run validate:components

      - name: Run component tests
        run: npm run test:components

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts
