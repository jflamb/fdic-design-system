name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@${{ vars.CHECKOUT_VERSION || 'v6' }}

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts

      - name: Copy Storybook into docs output
        run: cp -r apps/storybook/storybook-static apps/docs/.vitepress/dist/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@${{ vars.UPLOAD_PAGES_VERSION || 'v4' }}
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@${{ vars.DEPLOY_PAGES_VERSION || 'v4' }}
