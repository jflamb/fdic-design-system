name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-github-dot-com
  cancel-in-progress: true

jobs:
  build:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts

      - name: Copy Storybook into docs output
        run: cp -r apps/storybook/storybook-static apps/docs/.vitepress/dist/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    if: github.server_url == 'https://github.com'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
