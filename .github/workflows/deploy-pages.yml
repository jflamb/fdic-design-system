name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    env:
      VITEPRESS_BASE: ${{ vars.VITEPRESS_BASE || '' }}
      VITE_STORYBOOK_URL: ${{ vars.VITEPRESS_BASE && format('{0}storybook', vars.VITEPRESS_BASE) || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace
        with:
          jf-url: ${{ secrets.JF_URL || '' }}
          jf-token: ${{ secrets.JF_ACCESS_TOKEN || '' }}

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts

      - name: Copy Storybook into docs output
        run: cp -r apps/storybook/storybook-static apps/docs/.vitepress/dist/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
