name: "Deploy GitHub Pages (GHES)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-ghes
  cancel-in-progress: true

jobs:
  build:
    if: github.server_url != 'https://github.com'
    runs-on: ["linux", "on-azure", "prod"]
    env:
      VITEPRESS_BASE: ${{ vars.VITEPRESS_BASE || '' }}
      VITE_STORYBOOK_URL: ${{ vars.VITEPRESS_BASE && format('{0}storybook', vars.VITEPRESS_BASE) || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JFrog CLI
        uses: fdic-actions/setup-jfrog@v1
        with:
          jfUrl: ${{ vars.JF_PROD_URL }}
          jfToken: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Set up Node.js
        uses: fdic-actions/setup-node@v1
        with:
          node-version: 20

      - name: Configure npm resolution via JFrog
        run: jf npmc --repo-resolve="all-npm" --server-id-resolve="${{ github.event.repository.name }}.${{ github.sha }}"
        shell: bash

      - name: Install dependencies
        run: jf npm ci

      - name: Build published site assets
        uses: ./.github/actions/build-site-artifacts

      - name: Copy Storybook into docs output
        run: cp -r apps/storybook/storybook-static apps/docs/.vitepress/dist/storybook

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    if: github.server_url != 'https://github.com'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ["linux", "on-azure", "prod"]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
