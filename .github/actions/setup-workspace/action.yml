name: Setup Workspace
description: Set up Node.js and install workspace dependencies using the repo lockfile.

inputs:
  setup-node-version:
    description: 'Version tag for actions/setup-node (e.g. v4, v6)'
    default: 'v6'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@${{ inputs.setup-node-version }}
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
