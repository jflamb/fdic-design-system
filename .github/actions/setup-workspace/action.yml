name: Setup Workspace
description: Set up Node.js and install workspace dependencies using the repo lockfile.

inputs:
  jf-url:
    description: 'JFrog Artifactory base URL (required for GHES runners behind a firewall)'
    default: ''
  jf-token:
    description: 'JFrog access token (required for GHES runners behind a firewall)'
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Node.js
      shell: bash
      run: |
        # Check if node is already on PATH
        if command -v node &>/dev/null; then
          echo "Node.js $(node -v) already on PATH"
          exit 0
        fi
        # Use runner's bundled Node.js
        for dir in /home/runner/externals/node20/bin /home/runner/externals/node24/bin; do
          if [ -x "$dir/node" ]; then
            echo "$dir" >> "$GITHUB_PATH"
            export PATH="$dir:$PATH"
            echo "Using Node.js $("$dir/node" -v) from $dir"
            exit 0
          fi
        done
        echo "::error::Node.js not found on runner"
        exit 1

    - name: Configure JFrog npm registry
      if: inputs.jf-url != ''
      shell: bash
      run: |
        npm config set registry "${JF_URL}/artifactory/api/npm/ext-npmjs-npm/"
        npm config set //${JF_URL#https://}/artifactory/api/npm/ext-npmjs-npm/:_authToken "${JF_TOKEN}"
      env:
        JF_URL: ${{ inputs.jf-url }}
        JF_TOKEN: ${{ inputs.jf-token }}

    - name: Install dependencies
      shell: bash
      run: npm ci
