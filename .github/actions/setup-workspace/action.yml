name: Setup Workspace
description: Set up Node.js and install workspace dependencies using the repo lockfile.

inputs:
  jf-url:
    description: 'JFrog Artifactory base URL (required for GHES runners behind a firewall)'
    default: ''
  jf-token:
    description: 'JFrog access token (required for GHES runners behind a firewall)'
    default: ''

runs:
  using: composite
  steps:
    - name: Find Node.js
      shell: bash
      run: |
        echo "=== Checking PATH ==="
        command -v node && node -v || echo "node not on PATH"
        command -v npm && npm -v || echo "npm not on PATH"
        echo "=== Checking common locations ==="
        ls /opt/hostedtoolcache/ 2>/dev/null || echo "no hostedtoolcache"
        ls /usr/local/bin/node* 2>/dev/null || echo "not in /usr/local/bin"
        ls /usr/bin/node* 2>/dev/null || echo "not in /usr/bin"
        echo "=== Find node binary ==="
        find / -name "node" -type f 2>/dev/null | head -10 || true
        echo "=== Find npm ==="
        find / -name "npm" -type f 2>/dev/null | head -10 || true
        echo "=== Environment ==="
        echo "PATH: $PATH"

    - name: Configure JFrog npm registry
      if: inputs.jf-url != ''
      shell: bash
      run: |
        npm config set registry "${JF_URL}/artifactory/api/npm/fdic-npm-remote/"
        npm config set //${JF_URL#https://}/artifactory/api/npm/fdic-npm-remote/:_authToken "${JF_TOKEN}"
      env:
        JF_URL: ${{ inputs.jf-url }}
        JF_TOKEN: ${{ inputs.jf-token }}

    - name: Install dependencies
      shell: bash
      run: npm ci
