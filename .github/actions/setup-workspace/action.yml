name: Setup Workspace
description: Set up Node.js and install workspace dependencies using the repo lockfile.

inputs:
  jf-url:
    description: 'JFrog Artifactory base URL (required for GHES runners behind a firewall)'
    default: ''
  jf-token:
    description: 'JFrog access token (required for GHES runners behind a firewall)'
    default: ''

runs:
  using: composite
  steps:
    - name: Find Node.js
      shell: bash
      run: |
        # Use setup-node's known install path if available
        if [ -d "/opt/hostedtoolcache" ]; then
          NODE_DIR=$(find /opt/hostedtoolcache -path "*/node/20.*/x64/bin" -type d 2>/dev/null | sort -V | tail -1)
          if [ -n "$NODE_DIR" ]; then
            echo "$NODE_DIR" >> "$GITHUB_PATH"
            echo "Found Node.js at $NODE_DIR"
            exit 0
          fi
        fi
        # Check if node is already on PATH
        if command -v node &>/dev/null; then
          echo "Node.js $(node -v) already on PATH"
          exit 0
        fi
        echo "::error::Node.js not found"
        exit 1

    - name: Configure JFrog npm registry
      if: inputs.jf-url != ''
      shell: bash
      run: |
        npm config set registry "${JF_URL}/artifactory/api/npm/fdic-npm-remote/"
        npm config set //${JF_URL#https://}/artifactory/api/npm/fdic-npm-remote/:_authToken "${JF_TOKEN}"
      env:
        JF_URL: ${{ inputs.jf-url }}
        JF_TOKEN: ${{ inputs.jf-token }}

    - name: Install dependencies
      shell: bash
      run: npm ci
