4. Optionally update navigation in apps/docs/.vitepress/config.ts

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: apps/docs/components/*.md, apps/docs/.vitepress/theme/prose.css, apps/docs/.vitepress/theme/custom.css

