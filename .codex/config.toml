#:schema https://developers.openai.com/codex/config-schema.json

# ECC Tools generated Codex baseline
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--extension"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
config_file = "agents/docs-researcher.toml"

[agents.accessibility_tester]
description = "Accessibility-focused reviewer for component, docs, and interaction changes."
config_file = "agents/accessibility-tester.toml"

[agents.browser_debugger]
description = "Playwright-backed browser reproducer for UI bugs and runtime evidence gathering."
config_file = "agents/browser-debugger.toml"

[agents.build_engineer]
description = "Build and CI specialist for npm workspace, tsup, Storybook, and docs pipeline issues."
config_file = "agents/build-engineer.toml"

[agents.documentation_engineer]
description = "Docs maintainer focused on keeping repository guidance aligned with actual workflows."
config_file = "agents/documentation-engineer.toml"

[agents.test_automator]
description = "Targeted regression test author for Vitest and Storybook browser coverage."
config_file = "agents/test-automator.toml"

[agents.tooling_engineer]
description = "Developer tooling specialist for repo scripts, generators, and workflow glue."
config_file = "agents/tooling-engineer.toml"

[agents.typescript_pro]
description = "TypeScript specialist for Lit component contracts, type drift, and compiler-driven fixes."
config_file = "agents/typescript-pro.toml"
